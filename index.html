<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Extension Controller</title>
    <style>
      /* Color palette mapping */
      :root {
        --lavender: #e6e6fa;
        --thistle: #d8bfd8;
        --peach: #ffdab9;
        --sage-green: #c8d8c4;
        --muted-purple: #c3c1cd;
      }

      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: linear-gradient(135deg, var(--lavender), var(--thistle), var(--peach));
        background-size: 400% 400%;
        animation: flowingGradient 12s ease infinite;
      }

      @keyframes flowingGradient {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }

      /* Glassmorphism Container */
      .glass-card {
        background: rgba(255, 255, 255, 0.22);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border-radius: 28px;
        border: 1px solid rgba(255, 255, 255, 0.45);
        box-shadow: 0 16px 32px 0 rgba(74, 71, 90, 0.12);
        padding: 2.5rem 2rem;
        width: 340px;
        text-align: center;
      }

      h2 {
        margin: 0 0 0.5rem 0;
        font-weight: 700;
        color: #4a465a;
        letter-spacing: -0.5px;
      }

      p.subtitle {
        margin: 0 0 2rem 0;
        font-size: 0.9rem;
        color: #686377;
      }

      .status-badge {
        display: inline-flex;
        align-items: center;
        background: rgba(255, 255, 255, 0.35);
        padding: 6px 14px;
        border-radius: 50px;
        font-size: 0.85rem;
        font-weight: 600;
        color: #514d62;
        border: 1px solid rgba(255, 255, 255, 0.25);
        margin-bottom: 1.5rem;
      }

      .status-dot {
        width: 8px;
        height: 8px;
        background-color: #e07a5f;
        border-radius: 50%;
        margin-right: 8px;
        box-shadow: 0 0 8px #e07a5f;
        transition: all 0.4s ease;
      }

      .status-dot.connected {
        background-color: #52b788;
        box-shadow: 0 0 10px #52b788;
      }

      /* Buttons */
      .btn {
        width: 100%;
        padding: 14px;
        margin: 6px 0;
        font-size: 0.95rem;
        font-weight: 600;
        border: none;
        border-radius: 14px;
        cursor: pointer;
        transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      }

      #connectBtn {
        background: rgba(255, 255, 255, 0.25);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        color: #4a465a;
        border: 1px solid rgba(255, 255, 255, 0.6);
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        padding: 14px;
        width: 100%;
        border-radius: 14px;
        cursor: pointer;
        transition: 0.2s;
      }

      #connectBtn:hover:not(:disabled) {
        background: rgba(255, 255, 255, 0.45);
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(216, 191, 216, 0.6);
      }

      #onBtn {
        background-color: var(--sage-green);
        color: #3a4737;
      }

      #onBtn:hover:not(:disabled) {
        filter: brightness(0.96);
        transform: translateY(-2px);
      }

      #offBtn {
        background-color: rgba(255, 255, 255, 0.4);
        color: #4a465a;
        border: 1px solid rgba(255, 255, 255, 0.2);
      }

      #offBtn:hover:not(:disabled) {
        background-color: rgba(255, 255, 255, 0.55);
        transform: translateY(-2px);
      }

      button:disabled {
        opacity: 0.35;
        cursor: not-allowed;
        transform: none !important;
      }

      .power-indicator {
        margin-top: 1rem;
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        font-weight: 700;
        color: #7d788e;
      }

      /* New Controls for LCD and Timer */
      .advanced-controls {
        margin-top: 20px;
        text-align: left;
        border-top: 1px solid rgba(255,255,255,0.4);
        padding-top: 15px;
      }

      .control-label {
        font-size: 0.75rem;
        color: #514d62;
        font-weight: bold;
        letter-spacing: 0.5px;
      }

      .input-group {
        display: flex;
        gap: 8px;
        margin-top: 6px;
        margin-bottom: 12px;
      }

      .glass-input {
        flex: 1;
        padding: 10px;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.5);
        background: rgba(255, 255, 255, 0.3);
        color: #4a465a;
        font-weight: 600;
        outline: none;
      }

      .glass-input::placeholder { color: #8c889a; font-weight: 400; }

      .action-btn {
        padding: 10px 16px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-weight: bold;
        color: #4a465a;
        transition: 0.2s;
      }

      #startTimerBtn { background-color: var(--peach); }
      #startTimerBtn:hover:not(:disabled) { filter: brightness(0.95); transform: translateY(-1px); }
      
      #sendMsgBtn { background-color: var(--thistle); }
      #sendMsgBtn:hover:not(:disabled) { filter: brightness(0.95); transform: translateY(-1px); }

      #clearMsgBtn {
        width: 100%;
        padding: 8px;
        border: 1px solid rgba(255,255,255,0.4);
        border-radius: 8px;
        background: transparent;
        color: #514d62;
        cursor: pointer;
        font-size: 0.8rem;
        font-weight: 600;
        transition: 0.2s;
      }
      #clearMsgBtn:hover:not(:disabled) { background: rgba(255,255,255,0.2); }
    </style>
  </head>
  <body>
    <div class="glass-card">
      <h2>Smart Relay</h2>
      <p class="subtitle">Home Automation Portal</p>

      <div class="status-badge">
        <span id="statusDot" class="status-dot"></span>
        <span id="statusText">Disconnected</span>
      </div>

      <button id="connectBtn">Connect Bluetooth</button>

      <div style="margin-top: 1rem; display: flex; flex-direction: column; gap: 4px;">
        <button id="onBtn" class="btn" disabled>Turn Power ON</button>
        <button id="offBtn" class="btn" disabled>Turn Power OFF</button>
      </div>

      <div id="powerState" class="power-indicator">System Idle</div>

      <div class="advanced-controls">
        <label class="control-label">SET TIMER (MINUTES)</label>
        <div class="input-group">
          <input type="number" id="timerInput" class="glass-input" placeholder="e.g. 30" disabled>
          <button id="startTimerBtn" class="action-btn" disabled>Start</button>
        </div>

        <label class="control-label">LCD CUSTOM MESSAGE</label>
        <div class="input-group">
          <input type="text" id="msgInput" class="glass-input" placeholder="Up to 16 chars..." maxlength="16" disabled>
          <button id="sendMsgBtn" class="action-btn" disabled>Send</button>
        </div>
        <button id="clearMsgBtn" disabled>Return to Clock Mode</button>
      </div>
    </div>

    <script>
      let port;
      let writer;

      // Primary UI Elements
      const connectBtn = document.getElementById("connectBtn");
      const onBtn = document.getElementById("onBtn");
      const offBtn = document.getElementById("offBtn");
      const statusText = document.getElementById("statusText");
      const statusDot = document.getElementById("statusDot");
      const powerState = document.getElementById("powerState");

      // Advanced UI Elements
      const timerInput = document.getElementById("timerInput");
      const startTimerBtn = document.getElementById("startTimerBtn");
      const msgInput = document.getElementById("msgInput");
      const sendMsgBtn = document.getElementById("sendMsgBtn");
      const clearMsgBtn = document.getElementById("clearMsgBtn");

      // Array of buttons to enable/disable easily
      const hwControls = [onBtn, offBtn, timerInput, startTimerBtn, msgInput, sendMsgBtn, clearMsgBtn];

      connectBtn.addEventListener("click", async () => {
        try {
          port = await navigator.serial.requestPort();
          await port.open({ baudRate: 9600 });

          const textEncoder = new TextEncoderStream();
          const writableStreamClosed = textEncoder.readable.pipeTo(port.writable);
          writer = textEncoder.writable.getWriter();

          statusText.innerText = "Connected";
          statusDot.classList.add("connected");
          connectBtn.disabled = true;
          
          // Enable all controls
          hwControls.forEach(el => el.disabled = false);
          powerState.innerText = "System Armed";
        } catch (err) {
          console.error("Connection failed:", err);
          statusText.innerText = "Connection Failed";
          statusDot.classList.remove("connected");
        }
      });

      // The core sending function
      async function sendCommand(command, label) {
        if (writer) {
          // CRITICAL: We add \n here so Arduino's readStringUntil('\n') triggers!
          await writer.write(command + '\n');
          
          if (label) {
            powerState.innerText = `System: ${label}`;
            powerState.style.color = (label.includes("ON") || label.includes("ACTIVE")) ? "#475E43" : "#7D788E";
          }
        }
      }

      // Basic Buttons
      onBtn.addEventListener("click", () => sendCommand("1", "ON - Continuous"));
      offBtn.addEventListener("click", () => sendCommand("0", "OFF"));

      // Timer Logic
      startTimerBtn.addEventListener("click", () => {
        const mins = timerInput.value;
        if (mins > 0) {
          sendCommand(`T:${mins}`, `TIMER ACTIVE (${mins}m)`);
          timerInput.value = '';
        }
      });

      // Message Logic
      sendMsgBtn.addEventListener("click", () => {
        const msg = msgInput.value;
        if (msg.length > 0) {
          sendCommand(`M:${msg}`, 'Displaying Web Message');
        }
      });

      // Clear Message Logic
      clearMsgBtn.addEventListener("click", () => {
        sendCommand("C", "Displaying Clock");
        msgInput.value = '';
      });
    </script>
  </body>
</html>
